version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=kensei
      - POSTGRES_PASSWORD=kensei_pass
      - POSTGRES_DB=kensei_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ../
      dockerfile: infra/Dockerfile.api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../backend:/app/backend
      - ../data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kensei:kensei_pass@db:5432/kensei_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ../
      dockerfile: infra/Dockerfile.worker
    command: celery -A backend.workers.celery_app worker --loglevel=info
    volumes:
      - ../backend:/app/backend
      - ../data:/app/data
    environment:
      - DATABASE_URL=postgresql://kensei:kensei_pass@db:5432/kensei_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - api

  frontend:
    build:
      context: ../
      dockerfile: infra/Dockerfile.api  
    command: streamlit run frontend/streamlit_app/main.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ../frontend:/app/frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
